name: Sync to HuggingFace Spaces

on:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'requirements.txt'
      - 'agent/**'
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HFTOKEN }}
        run: git push -f https://lakshmenroy:$HF_TOKEN@huggingface.co/spaces/lakshmenroy/ai-smart-agent main
